<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Marrieta P. Ramirez</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --text-dark: #1a1a1a;
            --text-muted: #666666; /* Added to match about.html */
            --accent: #2563eb;
            --border: #e2e8f0;
            --light-gray: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-dark); 
            line-height: 1.6;
        }

        /* STICKY NAV */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; text-decoration: none; color: var(--text-dark); }
        
        .nav-links a { 
            text-decoration: none; 
            color: var(--text-dark); 
            margin-left: 2rem; 
            font-size: 0.9rem; 
            font-weight: 600; 
            transition: 0.2s; 
        }

        .nav-links a:hover { color: var(--accent); }
        .nav-links a.active { color: var(--accent); }

        /* CONTACT SECTION */
        .wrapper {
            padding: 140px 5% 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 60px;
            background: white;
        }

        .info-panel h1 { font-size: 3rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; }
        .info-panel p { color: #64748b; font-size: 1.1rem; margin-bottom: 40px; }

        .contact-method {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background: var(--light-gray);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        /* FORM STYLING */
        .form-card {
            background: var(--light-gray);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #475569; }
        
        input, textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            background: white;
        }

        input:focus, textarea:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: var(--text-dark);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { background: var(--accent); transform: translateY(-2px); }

        /* FOOTER (Matched with about.html) */
        footer { padding: 40px 5%; text-align: center; font-size: 0.8rem; color: var(--text-muted); border-top: 1px solid #f0f0f0; }
        .social-links { margin-bottom: 20px; display: flex; justify-content: center; gap: 20px; }
        .social-links a { color: var(--text-muted); font-size: 1.2rem; transition: 0.3s; text-decoration: none; }
        .social-links a:hover { color: var(--accent); }

        @media (max-width: 900px) {
            .contact-grid { grid-template-columns: 1fr; gap: 40px; }
            .info-panel h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="portfolio.html" class="logo">MARRIETTA P. RAMIREZ</a>
        <div class="nav-links">
            <a href="portfolio.html">Home</a>
            <a href="about.html">About</a>
            <a href="project.html">Project</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <div class="wrapper">
        <div class="contact-grid">
            
            <div class="info-panel">
                <h1>Let's work together.</h1>
                <p>Have a question or a proposal? I'd love to hear from you. Usually responds within 24 hours.</p>
                
                <div class="contact-method">
                    <div class="icon-box"><i class="fa-solid fa-envelope"></i></div>
                    <div>
                        <small style="display:block; color:#64748b; font-weight:600">Email Me</small>
                        <strong>marrpramirez@gmail.com</strong>
                    </div>
                </div>

                <div class="contact-method">
                    <div class="icon-box"><i class="fa-solid fa-location-dot"></i></div>
                    <div>
                        <small style="display:block; color:#64748b; font-weight:600">Location</small>
                        <strong>Butuan City, Philippines</strong>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <form>
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" placeholder="Marrietta P. Ramirez">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="marr@example.com">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Tell me about your project..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>

        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
        </div>
        <p>&copy; 2026 Marrietta P. Ramirez. All rights reserved.</p>
    </footer>

</body>
</html>
